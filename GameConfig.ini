[Game]
; 遊戲進程名稱（包含.exe）
ProcessName=AetherGazer.exe
; 遊戲窗口標題
WindowTitle=AetherGazer

[Window]
; 目標窗口寬度
TargetWidth=1600
; 目標窗口高度
TargetHeight=900
; 是否居中窗口 (true/false)
CenterWindow=true

[Process]
; 遊戲關閉後自動退出腳本的延遲時間（秒）
AutoExitDelay=3
; 進程檢查間隔（毫秒）
CheckInterval=3000
; 是否顯示退出提示消息 (true/false)
ShowExitMessage=true